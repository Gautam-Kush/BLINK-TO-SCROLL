name: Blink to Scroll CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libsctp-dev \
            python3-tk \
            python3-dev \
            scrot

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install mediapipe==0.10.33
          pip install opencv-python==4.13.0.92
          pip install pyautogui==0.9.54
          pip install numpy==2.4.4

      - name: Check all imports resolve correctly
        run: |
          python -c "
          import cv2
          import numpy
          import pyautogui
          import mediapipe as mp
          from mediapipe.tasks import python as mp_python
          from mediapipe.tasks.python.vision import FaceLandmarker, FaceLandmarkerOptions, RunningMode
          print('All imports successful')
          print('OpenCV version   :', cv2.__version__)
          print('MediaPipe version:', mp.__version__)
          print('NumPy version    :', numpy.__version__)
          "

      - name: Verify script syntax
        run: python -m py_compile blink_to_scroll.py && echo "Syntax OK"

      - name: Check code style with flake8
        run: |
          pip install flake8
          flake8 blink_to_scroll.py --max-line-length=120 --ignore=E501,W503
